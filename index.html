<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Magic</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* Starry night gradient: blends midnight blue into deep purple */
            background: linear-gradient(180deg, #0f0c20 0%, #2b1055 100%);
            background-attachment: fixed;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        h1 { 
            color: #f3a683; 
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
            font-size: 28px;
        }
        .box {
            background-color: #3d1b75; /* Plum purple for the boxes */
            padding: 20px;
            margin: 20px auto;
            border-radius: 15px;
            max-width: 400px;
            /* Subtle gold glow around the boxes */
            box-shadow: 0px 0px 15px rgba(243, 166, 131, 0.2);
            border: 1px solid rgba(243, 166, 131, 0.1);
        }
        button {
            background-color: #f3a683;
            color: #2b1055;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }
        button:hover { background-color: #f7b79e; }
        .result {
            margin-top: 15px;
            font-weight: bold;
            color: #4eed96;
            min-height: 20px;
            line-height: 1.5;
            font-size: 17px;
        }
        /* Style for the tarot card graphic */
        .tarot-card-visual {
            font-size: 60px;
            margin: 10px 0;
            display: inline-block;
        }
    </style>
</head>

    <!-- Fortune Cookie Section -->
    <div class="box">
