name: Generate APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build with Cordova
        run: |
          npm install -g cordova
          cordova create myapp com.dailymagic.tarot "Daily Magic"
          cp index.html myapp/www/
          cp icon.png myapp/www/icon.png
          echo '<widget id="com.dailymagic.tarot" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0"><name>Daily Magic</name><content src="index.html" /><icon src="icon.png" /></widget>' > myapp/config.xml
          cd myapp && cordova platform add android && cordova build android --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Magic-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
