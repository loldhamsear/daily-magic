name: Generate APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build with Cordova
        run: |
          npm install -g cordova
          cordova create myapp com.dailymagic.tarot "Daily Magic"
          
          cp index.html myapp/www/
          cp icon.png myapp/www/icon.png
          
          cd myapp
          
          echo '<?xml version="1.0" encoding="utf-8"?>' > config.xml
          echo '<widget id="com.dailymagic.tarot" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">' >> config.xml
          echo '    <name>Daily Magic</name>' >> config.xml
          echo '    <description>My Daily Magic App</description>' >> config.xml
          echo '    <content src="index.html" />' >> config.xml
          echo '    <icon src="www/icon.png" />' >> config.xml
          echo '    <platform name="android">' >> config.xml
          echo '        <icon src="www/icon.png" />' >> config.xml
          echo '    </platform>' >> config.xml
          echo '</widget>' >> config.xml
          
          cordova platform add android
          
          # This line downloads the Google AdMob plugin into your project
          cordova plugin add cordova-plugin-admob-free --save
          
          cordova build android --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Magic-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
