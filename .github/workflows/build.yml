name: Generate APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build with Cordova
        run: |
          npm install -g cordova
          cordova create myapp com.dailymagic.tarot "Daily Magic"
          cp index.html myapp/www/
          cp icon.png myapp/www/icon.png
          
          cd myapp
          cordova platform add android
          
          # Replace standard icons
          cp www/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Replace modern adaptive foreground icons too
          cp www/icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp www/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          
          cordova build android --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Magic-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
